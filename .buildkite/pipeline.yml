env:
  # SECRET_CODECOV_TOKEN can be added here if needed for coverage reporting

steps:
  - label: "Julia v{{matrix.version}}, {{matrix.label}}"
    plugins:
      - JuliaCI/julia#v1:
          version: "{{matrix.version}}"
      # - JuliaCI/julia-coverage#v1:
      #     dirs:
      #       - src
      #       - ext
    # `Pkg.develop` makes Julia 1.10 use the working tree's Bijectors. The `[sources]` section
    # in test/gpu/Project.toml only takes effect on Julia 1.11+, so on 1.10 the registry
    # version would be resolved instead.
    command: |
      julia --project=test/gpu --color=yes -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      julia --project=test/gpu --color=yes test/gpu/main.jl
    agents:
      queue: "cuda"
    if: build.message !~ /\[skip tests\]/
    timeout_in_minutes: 60
    env:
      LABEL: "{{matrix.label}}"
      TEST_TYPE: ext
    matrix:
      setup:
        version:
          - "1"
        label:
          - "cuda"
